<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Login Project</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      text-align: center;
      padding: 50px;
    }

    .box {
      background: white;
      padding: 20px;
      width: 300px;
      margin: auto;
      border-radius: 10px;
      box-shadow: 0 0 10px #ccc;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
    }

    button {
      padding: 10px 20px;
      background: green;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: darkgreen;
    }
  </style>
</head>

<body>

  <h1>🤖 AI Project Login</h1>

  <div class="box">
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>

    <p id="msg"></p>
  </div>

  <script>
    function login() {
      let user = document.getElementById("username").value;
      let pass = document.getElementById("password").value;

      if(user && pass){
        document.getElementById("msg").innerText = "Login sent to backend 🚀";

        // رابط الباك لاحقًا
        fetch("https://your-backend-url/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ username: user, password: pass })
        });

      } else {
        document.getElementById("msg").innerText = "Please fill all fields";
      }
    }
  </script>

</body>
</html>
